
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SnapBudget 💰</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #f5f7fa; color: #333; }
    .navbar { display:flex; justify-content:space-between; align-items:center;
              background:#1e293b; padding:0.75rem 1.5rem; color:#fff; }
    .nav-brand { font-size:1.3rem; font-weight:700; }
    .nav-links { display:flex; gap:0.5rem; }
    .nav-btn { background:transparent; border:1px solid #475569; color:#cbd5e1;
               padding:0.4rem 0.9rem; border-radius:6px; cursor:pointer; font-size:0.9rem; }
    .nav-btn.active { background:#3b82f6; border-color:#3b82f6; color:#fff; }
    .main-content { max-width:860px; margin:2rem auto; padding:0 1rem; }
    .view-container h2 { margin-bottom:1.2rem; font-size:1.5rem; }
    .view-container h3 { margin:1.2rem 0 0.8rem; }
    .summary-row { display:grid; grid-template-columns:repeat(3,1fr); gap:1rem; margin-bottom:1.5rem; }
    .summary-card { background:#fff; border-radius:10px; padding:1rem 1.2rem;
                    box-shadow:0 1px 4px rgba(0,0,0,.08); }
    .card-label { font-size:.8rem; color:#64748b; text-transform:uppercase; letter-spacing:.05em; }
    .card-amount { font-size:1.6rem; font-weight:700; margin-top:.3rem; }
    .txn-row { display:flex; align-items:center; gap:.75rem; background:#fff;
               padding:.65rem 1rem; border-radius:8px; margin-bottom:.4rem;
               box-shadow:0 1px 3px rgba(0,0,0,.06); flex-wrap:wrap; }
    .txn-date { font-size:.8rem; color:#94a3b8; min-width:80px; }
    .txn-desc { flex:1; font-weight:500; }
    .txn-cat { font-size:.8rem; color:#64748b; }
    .txn-amount { font-weight:700; min-width:80px; text-align:right; }
    .income { color:#16a34a; }
    .expense { color:#dc2626; }
    .delete-btn { background:none; border:none; cursor:pointer; font-size:1rem; opacity:.5; }
    .delete-btn:hover { opacity:1; }
    .confirm-row { display:flex; gap:.5rem; align-items:center; padding:.5rem 1rem;
                   background:#fef9c3; border-radius:6px; margin-bottom:.4rem; }
    .confirm-yes { background:#dc2626; color:#fff; border:none; border-radius:5px;
                   padding:.3rem .7rem; cursor:pointer; }
    .confirm-no { background:#94a3b8; color:#fff; border:none; border-radius:5px;
                  padding:.3rem .7rem; cursor:pointer; }
    .form-group { margin-bottom:1rem; display:flex; flex-direction:column; gap:.3rem; }
    .form-group label { font-size:.85rem; font-weight:600; color:#374151; }
    .form-group input, .form-group select {
        padding:.55rem .8rem; border:1px solid #d1d5db; border-radius:7px;
        font-size:1rem; outline:none; }
    .form-group input:focus, .form-group select:focus { border-color:#3b82f6; }
    .toggle-row { display:flex; gap:.5rem; }
    .toggle-btn { padding:.45rem 1.2rem; border:1px solid #d1d5db; border-radius:6px;
                  background:#fff; cursor:pointer; font-size:.9rem; }
    .active-exp { background:#fee2e2; border-color:#f87171; color:#b91c1c; font-weight:700; }
    .active-inc { background:#dcfce7; border-color:#4ade80; color:#15803d; font-weight:700; }
    .submit-btn { width:100%; padding:.75rem; background:#3b82f6; color:#fff; border:none;
                  border-radius:8px; font-size:1.05rem; cursor:pointer; font-weight:600; margin-top:.5rem; }
    .submit-btn:hover { background:#2563eb; }
    .error-msg { color:#dc2626; font-size:.9rem; }
    .success-banner { background:#dcfce7; border:1px solid #4ade80; border-radius:8px;
                      padding:.7rem 1rem; margin-bottom:1rem; display:flex;
                      justify-content:space-between; align-items:center; }
    .filter-row { display:flex; gap:.75rem; align-items:center; margin-bottom:1rem; flex-wrap:wrap; }
    .filter-row select { padding:.45rem .7rem; border:1px solid #d1d5db; border-radius:6px; }
    .export-btn { background:#0f172a; color:#fff; border:none; border-radius:6px;
                  padding:.45rem 1rem; cursor:pointer; }
    .bar-chart { display:flex; flex-direction:column; gap:.6rem; }
    .bar-row { display:grid; grid-template-columns:160px 1fr 80px; align-items:center; gap:.6rem; }
    .bar-label { font-size:.85rem; }
    .bar-track { background:#e2e8f0; border-radius:4px; height:18px; overflow:hidden; }
    .bar-fill { background:#3b82f6; height:100%; border-radius:4px; transition:width .4s ease; }
    .bar-value { font-size:.85rem; font-weight:600; text-align:right; }
    .empty-msg { color:#94a3b8; font-style:italic; }
    .footer { text-align:center; padding:2rem; font-size:.8rem; color:#94a3b8; margin-top:2rem; }
    .recent-section { background:#fff; border-radius:10px; padding:1rem 1.2rem;
                      box-shadow:0 1px 4px rgba(0,0,0,.08); }
    @media(max-width:600px) {
      .summary-row { grid-template-columns:1fr; }
      .bar-row { grid-template-columns:120px 1fr 60px; }
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script type="module" src="/src/App.fs.js"></script>
</body>
</html>
